# fly.toml app configuration file generated for khora-server on 2026-04-02T16:55:16+11:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'khora-server'
primary_region = 'iad'

[build]

[env]
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
